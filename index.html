<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <h1>SPACE INVADERS</h1>
        <canvas id="gameCanvas"></canvas>
        <div class="instructions">
            <p><span class="key">ARROW LEFT / ARROW RIGHT</span> - Move the ship</p>
            <p><span class="key">SPACE</span> - Fire bullets</p>
            <p><span class="key">ENTER</span> - Start / Return to Menu</p>
            <p style="margin-top: 15px; color: #808080; font-size: 12px;">6 Levels of Alien Mayhem | Defeat the W-formation on Level 6!</p>
        </div>
    </div>

    <script src="SpaceInvaders.js"></script>
</body>
</html>
